{% assign url = page.url | absolute_url | url_encode %}
{% assign title = page.title | url_encode %}

<div class="social-share">
  <p>Share this post:</p>
  <a href="https://twitter.com/intent/tweet?url={{ url }}&text={{ title }}&via={{ site.twitter.username }}" 
     target="_blank" rel="noopener">Twitter</a>
  
  <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ url }}" 
     target="_blank" rel="noopener">LinkedIn</a>
  
  <a href="mailto:?subject={{ title }}&body=I thought you might find this interesting: {{ url }}" 
     target="_blank" rel="noopener">Email</a>
</div>
