{% if site.talkyard_server_url %}
<section class="comments-section">
  <h3>Comments</h3>
  <script>talkyardServerUrl='{{ site.talkyard_server_url }}';</script>
  <script async defer src="{{ site.talkyard_script_url }}"></script>
  
  <div class="talkyard-comments" 
       data-discussion-id="{{ page.discussion_id | default: page.url }}" 
       style="margin-top: 1rem;">
    <noscript>
      <p>Please enable JavaScript to view comments.</p>
    </noscript>
  </div>
</section>
{% endif %}
